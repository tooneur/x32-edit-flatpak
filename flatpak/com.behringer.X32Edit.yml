app-id: com.behringer.X32Edit
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
command: x32-edit

finish-args:
  - --share=network
  - --socket=x11
  - --socket=wayland
  - --socket=pulseaudio
  - --filesystem=home

modules:
  - name: x32-edit-assets
    buildsystem: simple
    build-commands:
      - install -Dm755 X32-Edit /app/share/x32-edit/X32-Edit
      - install -Dm755 flatpak/x32-edit.sh /app/bin/x32-edit
      - install -Dm644 flatpak/com.behringer.X32Edit.desktop /app/share/applications/com.behringer.X32Edit.desktop
      - install -Dm644 flatpak/com.behringer.X32Edit.metainfo.xml /app/share/metainfo/com.behringer.X32Edit.metainfo.xml
      - install -Dm644 X32-Edit_icon.png /app/share/icons/hicolor/512x512/apps/com.behringer.X32Edit.png
      - install -d /app/lib
      - |
        for p in /usr/lib/libcurl.so.4 /usr/lib64/libcurl.so.4 /usr/lib/x86_64-linux-gnu/libcurl.so.4; do
          if [ -e "$p" ]; then
            ln -sf "$p" /app/lib/libcurl-gnutls.so.4
            break
          fi
        done
      - test -e /app/lib/libcurl-gnutls.so.4
      - |
        for file in *.png *.txt *.pdf; do
          install -Dm644 "$file" "/app/share/x32-edit/$file"
        done
    sources:
      - type: dir
        path: ..